org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.workers.max=2
org.gradle.parallel=false
android.useAndroidX=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
# flutter_soloud is only used for raw PCM buffer playback (XiaoAI voice replies);
# container codecs (FLAC/Ogg/Opus/Vorbis) are never fed to it, so skip linking
# the bundled Xiph libraries to keep the APK lean.
NO_XIPH_LIBS=true
